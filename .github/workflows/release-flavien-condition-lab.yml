name: Release Flavien's Condition Lab

on:
  push:
    tags:
      - "flavien-condition-lab-v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#flavien-condition-lab-v}" >> $GITHUB_OUTPUT

      - name: Update version in module.json
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" modules/flavien-condition-lab/module.json
          sed -i "s|flavien-condition-lab-v[0-9.]*|flavien-condition-lab-v$VERSION|g" modules/flavien-condition-lab/module.json

      - name: Create zip
        run: |
          cd modules
          zip -r ../flavien-condition-lab.zip flavien-condition-lab/ \
            --exclude "*.git*" \
            --exclude "*node_modules*" \
            --exclude "*.DS_Store"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Flavien's Condition Lab v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## Flavien's Condition Lab v${{ steps.version.outputs.VERSION }}

            ### Install in Foundry VTT
            Manifest URL:
            ```
            https://raw.githubusercontent.com/Flavien-Gascard/foundry-modules-and-macro/main/modules/flavien-condition-lab/module.json
            ```
          files: |
            flavien-condition-lab.zip
            modules/flavien-condition-lab/module.json
